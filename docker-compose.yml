# Déploiement VPS Docker — abonnement Claude (claude -p) en primaire, repli API.
#
# 1) Sur le VPS (où `claude` est installé et connecté) :
#       claude setup-token            # → copie le token long-lived
# 2) Récupère le code + crée le .env (reste local, gitignoré) :
#       git clone git@github.com:DotDebian/onemoregamble.git && cd onemoregamble
#       cat > .env <<'EOF'
#       CLAUDE_CODE_OAUTH_TOKEN=<le-token-de-setup-token>
#       ANTHROPIC_API_KEY=sk-ant-...        # repli (optionnel mais recommandé)
#       EOF
# 3) Build + run :
#       docker compose up -d --build
#       docker compose logs -f              # cherche  "via":"subscription"
#
# Puis Nginx Proxy Manager → Proxy Host vers http://127.0.0.1:3000
# (ou http://onemoregamble:3000 via l'option "réseau partagé" en bas).

services:
  app:
    build: .
    image: onemoregamble:latest
    container_name: onemoregamble
    restart: unless-stopped
    # Loopback uniquement : jamais exposé sur l'IP publique. NPM proxifie dessus.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # 'auto' = abonnement (claude -p) d'abord, puis repli sur la clé API.
      CHAT_MODE: auto
      # Abonnement (issu de `claude setup-token`). Sans lui, 'auto' tombe sur la clé.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Repli API (per-token) si l'abonnement est indisponible.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NUXT_PUBLIC_MODEL: ${NUXT_PUBLIC_MODEL:-claude-sonnet-4-6}
      NUXT_PUBLIC_EFFORT: ${NUXT_PUBLIC_EFFORT:-medium}

# ── Option (souvent plus simple si NPM tourne en conteneur) : aucun port publié ──
# Supprime le bloc `ports:` ci-dessus, mets l'app sur le réseau de NPM, et dans NPM
# pointe le Proxy Host vers  http://onemoregamble:3000  (nom du conteneur).
#
#    networks:
#      - npm
#
# networks:
#   npm:
#     external: true
#     name: <reseau_docker_de_NPM>   # trouve-le avec : docker network ls
