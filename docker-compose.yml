# Déploiement sur un VPS Docker (derrière Nginx Proxy Manager) :
#   git clone git@github.com:DotDebian/onemoregamble.git && cd onemoregamble
#   printf 'ANTHROPIC_API_KEY=sk-ant-...\n' > .env      # clé de prod (ce .env reste local, gitignoré)
#   docker compose up -d --build
#   docker compose logs -f
#
# Puis dans Nginx Proxy Manager → Proxy Host vers  http://127.0.0.1:3000
# (ou http://onemoregamble:3000 si tu utilises l'option "réseau partagé" en bas).

services:
  app:
    build: .
    image: onemoregamble:latest
    container_name: onemoregamble
    restart: unless-stopped
    # Loopback uniquement : jamais exposé sur l'IP publique. NPM proxifie dessus.
    # Si NPM tourne en conteneur, il doit pouvoir joindre le loopback de l'hôte
    # (host.docker.internal) — sinon préfère l'option "réseau partagé" plus bas.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # 'api' = clé seule (recommandé en conteneur) · 'auto'/'subscription' = abonnement
      CHAT_MODE: api
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?manquant — ajoute-le dans .env à côté du compose}
      NUXT_PUBLIC_MODEL: ${NUXT_PUBLIC_MODEL:-claude-sonnet-4-6}
      NUXT_PUBLIC_EFFORT: ${NUXT_PUBLIC_EFFORT:-medium}

# ── Option (souvent plus simple si NPM tourne en conteneur) : aucun port publié ──
# Supprime le bloc `ports:` ci-dessus, mets l'app sur le réseau de NPM, et dans NPM
# pointe le Proxy Host vers  http://onemoregamble:3000  (nom du conteneur).
#
#    networks:
#      - npm
#
# networks:
#   npm:
#     external: true
#     name: <reseau_docker_de_NPM>   # trouve-le avec : docker network ls
